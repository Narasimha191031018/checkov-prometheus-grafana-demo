trigger:
- none

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@0
  inputs:
    terraformVersion: '1.15.7'

- task: AzureCLI@2
  displayName: 'Terraform Init + Plan'
  inputs:
    azureSubscription: 'ado-terraform-sp'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      cd terraform
      terraform init -reconfigure
      terraform plan -out=tfplan

- task: PublishPipelineArtifact@1
  displayName: 'Publish Terraform Config + Plan'
  inputs:
    targetPath: terraform
    artifact: terraform
    publishLocation: 'pipeline'

- script: |
    docker run --rm -v $(pwd)/terraform:/tf \
      bridgecrew/checkov -d /tf -o json > checkov_results.json || true
  displayName: 'Run Checkov Scan (non-blocking)'

- task: PublishPipelineArtifact@1
  displayName: 'Publish Checkov Results'
  inputs:
    targetPath: checkov_results.json
    artifact: checkov_results
    publishLocation: 'pipeline'
