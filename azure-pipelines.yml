trigger:
- none

pool:
  vmImage: 'ubuntu-latest'

steps:
# Step 0: Install Terraform
- task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@0
  inputs:
    terraformVersion: '1.15.7'

# Step 1: Terraform Init (First run only: migrate state)
- task: AzureCLI@2
  displayName: 'Terraform Init (Migrate State - First Run Only)'
  inputs:
    azureSubscription: 'ado-terraform-sp'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      cd terraform
      # This moves local state into Azure backend
      terraform init -migrate-state

# Step 2: Terraform Init + Plan (Subsequent runs)
- task: AzureCLI@2
  displayName: 'Terraform Init & Plan'
  inputs:
    azureSubscription: 'ado-terraform-sp'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      cd terraform
      # Clean local state (safe after migration)
      rm -rf .terraform terraform.tfstate*
      # Connect to backend
      terraform init -reconfigure
      # Generate plan file
      terraform plan -out=tfplan

# Step 3: Publish Plan Artifact
- task: PublishPipelineArtifact@1
  displayName: 'Publish Plan Artifact'
  inputs:
    targetPath: terraform/tfplan
    artifact: tfplan
    publishLocation: 'pipeline'

# Step 4: Run Checkov via Docker
- script: |
    docker run --rm -v $(pwd)/terraform:/tf bridgecrew/checkov -d /tf -o json > checkov_results.json
  displayName: 'Run Checkov Scan (Docker)'

# Step 5: Setup Python Virtualenv + Start Exporter
- script: |
    python3 -m venv venv
    source venv/bin/activate
    pip install --upgrade pip setuptools wheel flask
    python exporter/exporter.py checkov_results.json &
  displayName: 'Start Exporter Service (Python)'
